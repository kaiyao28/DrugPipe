column_mappings:
  gwas_summary_statistics:
    variant_id: SNP
    chromosome: CHR
    position: BP
    effect_allele: A1
    other_allele: A2
    effect_size: BETA
    standard_error: SE
    p_value: P
    effect_allele_frequency: EAF
    minor_allele_frequency: MAF
    imputation_info: INFO
    sample_size: N

qc_thresholds:
  min_info: 0.8
  min_maf: 0.01
  remove_ambiguous: true

locus_settings:
  p_threshold: 5.0e-8
  window_kb: 500

scoring_weights:
  genetic_association: 0.20
  fine_mapping: 0.10
  locus_to_gene: 0.15
  qtl_colocalisation: 0.15
  bone_cell_context: 0.10
  pathway_context: 0.05
  mr_target_validation: 0.15
  druggability: 0.10

penalties:
  safety_penalty_weight: 0.10
  annotation_bias_penalty_weight: 0.05
