<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="520" viewBox="0 0 1180 520" role="img" aria-labelledby="title desc">
  <title id="title">DrugPipe workflow</title>
  <desc id="desc">Workflow from GWAS summary statistics through evidence integration to ranked targets and evidence cards.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#64748b"/>
    </marker>
    <style>
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .primary { fill: #ecfeff; stroke: #0891b2; }
      .evidence { fill: #f0fdf4; stroke: #16a34a; }
      .output { fill: #fffbeb; stroke: #d97706; }
      .label { font: 700 17px Inter, Arial, sans-serif; fill: #0f172a; }
      .sub { font: 14px Inter, Arial, sans-serif; fill: #475569; }
      .small { font: 13px Inter, Arial, sans-serif; fill: #475569; }
      .line { stroke: #64748b; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1180" height="520" fill="#f8fafc"/>
  <text x="42" y="54" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#0f172a">DrugPipe workflow</text>
  <text x="42" y="82" font-family="Inter, Arial, sans-serif" font-size="15" fill="#475569">Local files in, ranked target hypotheses and Markdown evidence outputs out.</text>

  <g transform="translate(42 126)">
    <rect class="box primary" x="0" y="0" width="190" height="86" rx="12"/>
    <text class="label" x="22" y="34">GWAS inputs</text>
    <text class="sub" x="22" y="59">summary statistics</text>
  </g>
  <path class="line" d="M232 169 H302"/>

  <g transform="translate(302 126)">
    <rect class="box primary" x="0" y="0" width="190" height="86" rx="12"/>
    <text class="label" x="22" y="34">QC</text>
    <text class="sub" x="22" y="59">harmonise and filter</text>
  </g>
  <path class="line" d="M492 169 H562"/>

  <g transform="translate(562 126)">
    <rect class="box primary" x="0" y="0" width="190" height="86" rx="12"/>
    <text class="label" x="22" y="34">Loci</text>
    <text class="sub" x="22" y="59">lead SNP windows</text>
  </g>
  <path class="line" d="M752 169 H822"/>

  <g transform="translate(822 126)">
    <rect class="box primary" x="0" y="0" width="190" height="86" rx="12"/>
    <text class="label" x="22" y="34">Genes</text>
    <text class="sub" x="22" y="59">candidate mapping</text>
  </g>

  <path class="line" d="M917 212 V266"/>

  <g transform="translate(84 286)">
    <rect class="box evidence" x="0" y="0" width="164" height="86" rx="12"/>
    <text class="label" x="18" y="33">Fine-map</text>
    <text class="small" x="18" y="58">PIP and credible sets</text>
  </g>
  <g transform="translate(284 286)">
    <rect class="box evidence" x="0" y="0" width="164" height="86" rx="12"/>
    <text class="label" x="18" y="33">QTL</text>
    <text class="small" x="18" y="58">colocalisation</text>
  </g>
  <g transform="translate(484 286)">
    <rect class="box evidence" x="0" y="0" width="164" height="86" rx="12"/>
    <text class="label" x="18" y="33">Biology</text>
    <text class="small" x="18" y="58">cells and pathways</text>
  </g>
  <g transform="translate(684 286)">
    <rect class="box evidence" x="0" y="0" width="164" height="86" rx="12"/>
    <text class="label" x="18" y="33">MR</text>
    <text class="small" x="18" y="58">target and safety scans</text>
  </g>
  <g transform="translate(884 286)">
    <rect class="box evidence" x="0" y="0" width="164" height="86" rx="12"/>
    <text class="label" x="18" y="33">Druggability</text>
    <text class="small" x="18" y="58">tractability annotation</text>
  </g>

  <path class="line" d="M166 372 V430 H442"/>
  <path class="line" d="M366 372 V430 H442"/>
  <path class="line" d="M566 372 V430 H442"/>
  <path class="line" d="M766 372 V430 H442"/>
  <path class="line" d="M966 372 V430 H738"/>

  <g transform="translate(442 408)">
    <rect class="box output" x="0" y="0" width="296" height="76" rx="12"/>
    <text class="label" x="28" y="31">Ranked targets</text>
    <text class="sub" x="28" y="55">reports and target evidence cards</text>
  </g>
</svg>
