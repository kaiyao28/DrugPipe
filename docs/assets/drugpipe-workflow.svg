<svg xmlns="http://www.w3.org/2000/svg" width="1560" height="700" viewBox="0 0 1560 700" role="img" aria-labelledby="title desc">
  <title id="title">DrugPipe workflow</title>
  <desc id="desc">From GWAS loci to ranked target hypotheses using integrated genetic, molecular and druggability evidence.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="blueCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e0f2fe"/>
      <stop offset="1" stop-color="#eff6ff"/>
    </linearGradient>
    <linearGradient id="greenCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dcfce7"/>
      <stop offset="1" stop-color="#ecfdf5"/>
    </linearGradient>
    <linearGradient id="orangeCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffedd5"/>
      <stop offset="1" stop-color="#fffbeb"/>
    </linearGradient>
    <filter id="shadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <filter id="softShadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.09"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0 0 L12 6 L0 12 Z" fill="#64748b"/>
    </marker>
    <marker id="greenArrow" markerWidth="11" markerHeight="11" refX="8" refY="5.5" orient="auto">
      <path d="M0 0 L11 5.5 L0 11 Z" fill="#22c55e"/>
    </marker>
    <style>
      .title { font: 800 38px Inter, Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 19px Inter, Arial, sans-serif; fill: #475569; }
      .card-title { font: 800 25px Inter, Arial, sans-serif; fill: #0f172a; }
      .card-sub { font: 17px Inter, Arial, sans-serif; fill: #475569; }
      .hub-title { font: 800 29px Inter, Arial, sans-serif; fill: #14532d; }
      .hub-sub { font: 17px Inter, Arial, sans-serif; fill: #166534; }
      .chip-title { font: 800 18px Inter, Arial, sans-serif; fill: #14532d; }
      .chip-sub { font: 15px Inter, Arial, sans-serif; fill: #475569; }
      .section { font: 700 15px Inter, Arial, sans-serif; fill: #64748b; letter-spacing: 0.4px; }
      .blue { fill: url(#blueCard); stroke: #0284c7; stroke-width: 2; }
      .green { fill: url(#greenCard); stroke: #16a34a; stroke-width: 2; }
      .orange { fill: url(#orangeCard); stroke: #d97706; stroke-width: 2; }
      .flow { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); stroke-linecap: round; }
      .feed { stroke: #22c55e; stroke-width: 2.4; fill: none; marker-end: url(#greenArrow); stroke-linecap: round; opacity: 0.85; }
      .motif { stroke: #0284c7; stroke-width: 3; fill: none; stroke-linecap: round; }
      .dot { fill: #0284c7; opacity: 0.85; }
    </style>
  </defs>

  <rect width="1560" height="700" fill="url(#bg)"/>
  <path d="M80 600 C260 548 410 642 612 590 C828 535 1014 571 1208 520 C1340 485 1440 480 1508 496" fill="none" stroke="#dbeafe" stroke-width="34" opacity="0.45"/>

  <text class="title" x="70" y="70">DrugPipe workflow</text>
  <text class="subtitle" x="70" y="106">From GWAS loci to ranked target hypotheses using integrated genetic, molecular and druggability evidence.</text>

  <text class="section" x="92" y="164">DATA INPUT</text>
  <g transform="translate(70 188)" filter="url(#shadow)">
    <rect class="blue" x="0" y="0" width="210" height="150" rx="24"/>
    <text class="card-title" x="32" y="55">GWAS</text>
    <text class="card-sub" x="32" y="88">summary statistics</text>
    <path class="motif" d="M32 116 C48 99 62 132 80 112 C98 92 112 130 130 110 C146 94 160 115 178 100"/>
    <circle class="dot" cx="50" cy="114" r="5"/>
    <circle class="dot" cx="86" cy="109" r="5"/>
    <circle class="dot" cx="126" cy="111" r="5"/>
    <circle class="dot" cx="166" cy="104" r="5"/>
  </g>

  <path class="flow" d="M280 263 H332"/>

  <text class="section" x="350" y="164">GENETIC INTERPRETATION</text>
  <g transform="translate(332 188)" filter="url(#shadow)">
    <rect class="blue" x="0" y="0" width="206" height="150" rx="24"/>
    <text class="card-title" x="30" y="55">Loci</text>
    <text class="card-sub" x="30" y="88">lead SNP windows</text>
    <g opacity="0.9">
      <line x1="30" y1="119" x2="176" y2="119" stroke="#0284c7" stroke-width="4" stroke-linecap="round"/>
      <circle class="dot" cx="60" cy="119" r="6"/>
      <circle class="dot" cx="112" cy="119" r="8"/>
      <circle class="dot" cx="154" cy="119" r="5"/>
    </g>
  </g>

  <path class="flow" d="M538 263 H590"/>

  <g transform="translate(590 188)" filter="url(#shadow)">
    <rect class="blue" x="0" y="0" width="240" height="150" rx="24"/>
    <text class="card-title" x="30" y="55">Candidate genes</text>
    <text class="card-sub" x="30" y="88">locus-to-gene mapping</text>
    <g opacity="0.9">
      <rect x="32" y="110" width="44" height="14" rx="7" fill="#38bdf8"/>
      <rect x="88" y="110" width="66" height="14" rx="7" fill="#0ea5e9"/>
      <rect x="166" y="110" width="42" height="14" rx="7" fill="#7dd3fc"/>
      <line x1="32" y1="135" x2="208" y2="135" stroke="#0284c7" stroke-width="3" stroke-linecap="round"/>
    </g>
  </g>

  <path class="flow" d="M830 263 H890"/>

  <text class="section" x="920" y="164">EVIDENCE SCORING</text>
  <g transform="translate(890 170)" filter="url(#shadow)">
    <rect class="green" x="0" y="0" width="270" height="186" rx="30"/>
    <text class="hub-title" x="34" y="65">Evidence</text>
    <text class="hub-title" x="34" y="100">integration</text>
    <text class="hub-sub" x="34" y="135">genetic + molecular</text>
    <text class="hub-sub" x="34" y="160">+ biological support</text>
    <circle cx="224" cy="56" r="26" fill="#bbf7d0" stroke="#16a34a" stroke-width="2"/>
    <path d="M210 56 H238 M224 42 V70" stroke="#16a34a" stroke-width="4" stroke-linecap="round"/>
  </g>

  <path class="flow" d="M1160 263 H1208"/>

  <text class="section" x="1224" y="164">OUTPUTS</text>
  <g transform="translate(1208 188)" filter="url(#shadow)">
    <rect class="orange" x="0" y="0" width="166" height="150" rx="24"/>
    <text class="card-title" x="24" y="55">Ranked</text>
    <text class="card-title" x="24" y="84">targets</text>
    <text class="card-sub" x="24" y="116">prioritised</text>
    <text class="card-sub" x="24" y="137">hypotheses</text>
  </g>

  <path class="flow" d="M1374 263 H1412"/>

  <g transform="translate(1412 188)" filter="url(#shadow)">
    <rect class="orange" x="0" y="0" width="128" height="150" rx="24"/>
    <text class="card-title" x="20" y="48">Reports</text>
    <text class="card-title" x="20" y="77">+ cards</text>
    <text class="card-sub" x="20" y="110">Markdown</text>
    <text class="card-sub" x="20" y="131">outputs</text>
  </g>

  <text class="section" x="820" y="430">EVIDENCE LAYERS</text>
  <path class="feed" d="M972 414 C986 386 1000 368 1018 356"/>

  <g transform="translate(510 462)" filter="url(#softShadow)">
    <rect class="green" x="0" y="0" width="172" height="94" rx="20"/>
    <text class="chip-title" x="24" y="36">Fine-mapping</text>
    <text class="chip-sub" x="24" y="63">PIP / credible</text>
    <text class="chip-sub" x="24" y="81">sets</text>
  </g>

  <g transform="translate(706 462)" filter="url(#softShadow)">
    <rect class="green" x="0" y="0" width="172" height="94" rx="20"/>
    <text class="chip-title" x="28" y="36">QTL / omics</text>
    <text class="chip-sub" x="28" y="63">molecular links</text>
  </g>

  <g transform="translate(902 462)" filter="url(#softShadow)">
    <rect class="green" x="0" y="0" width="172" height="94" rx="20"/>
    <text class="chip-title" x="24" y="36">Bone biology</text>
    <text class="chip-sub" x="24" y="63">cells / pathways</text>
  </g>

  <g transform="translate(1098 462)" filter="url(#softShadow)">
    <rect class="green" x="0" y="0" width="172" height="94" rx="20"/>
    <text class="chip-title" x="26" y="36">MR + safety</text>
    <text class="chip-sub" x="24" y="63">target and</text>
    <text class="chip-sub" x="24" y="81">liability scans</text>
  </g>

  <g transform="translate(1294 462)" filter="url(#softShadow)">
    <rect class="green" x="0" y="0" width="172" height="94" rx="20"/>
    <text class="chip-title" x="22" y="36">Druggability</text>
    <text class="chip-sub" x="22" y="63">tractability</text>
  </g>
</svg>
